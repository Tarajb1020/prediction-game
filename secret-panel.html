<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone Pro - Admin Analytics Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #f1c40f; font-size: 26px; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
        .status { color: #2ecc71; font-size: 13px; margin-bottom: 25px; font-weight: bold; letter-spacing: 0.5px; }
        .wrapper { max-width: 500px; margin: 0 auto; }
        
        .grid-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .box {
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            text-align: center;
        }
        .big-box { border-top: 6px solid #6366f1; }
        .small-box { border-top: 6px solid #f97316; }
        .stats-box { border-top: 6px solid #10b981; grid-column: span 2; }
        
        .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .money { font-size: 28px; font-weight: 900; margin-top: 5px; }
        
        #big-money { color: #818cf8; }
        #small-money { color: #fb923c; }
        #total-players { color: #34d399; }
        
        .decision-box {
            background: #111827;
            border: 2px dashed #f1c40f;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .decision-title { color: #f1c40f; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .kill-target { font-size: 20px; font-weight: 900; color: #fff; margin-top: 8px; }
    </style>
</head>
<body>

    <h1>WIN ZONE ADMIN PANEL</h1>
    <div class="status" id="net-status">🔄 CONNECTING LIVE DATABASE...</div>

    <div class="wrapper">
        <div class="grid-box">
            <div class="box big-box">
                <div class="label">Total On BIG</div>
                <div class="money" id="big-money">0 PKR</div>
            </div>

            <div class="box small-box">
                <div class="label">Total On SMALL</div>
                <div class="money" id="small-money">0 PKR</div>
            </div>

            <div class="box stats-box">
                <div class="label">Active Bets Count</div>
                <div class="money" id="total-players">0</div>
            </div>
        </div>

        <div class="decision-box">
            <div class="decision-title">📊 Analytics Pool Summary</div>
            <div class="kill-target" id="final-verdict">LOADING LIVE ROUND...</div>
        </div>
    </div>

    <script>
        // Firebase Configuration[cite: 1]
        const firebaseConfig = {
            databaseURL: "https://winzone-bff7c-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Reading data from 'wingo_bets' node[cite: 1]
        database.ref('wingo_bets').on('value', (snapshot) => {
            const betsData = snapshot.val() || {};
            document.getElementById('net-status').innerText = "🟢 LIVE MONITOR ACTIVE (SECURE CONNECTION)";
            
            let bigCash = 0;
            let smallCash = 0;
            let totalBetsCount = 0;

            Object.keys(betsData).forEach(key => {
                const bet = betsData[key];
                totalBetsCount++;
                
                let actualAmount = 0;
                if(bet.amount) {
                    actualAmount = parseInt(bet.amount);
                }

                // Identifying bet types[cite: 1]
                if (bet.value === 'Big' || bet.type === 'Big') {
                    bigCash += actualAmount;
                } else if (bet.value === 'Small' || bet.type === 'Small') {
                    smallCash += actualAmount;
                }
            });

            // Updating UI Elements[cite: 1]
            document.getElementById('big-money').innerText = bigCash.toLocaleString() + " PKR";
            document.getElementById('small-money').innerText = smallCash.toLocaleString() + " PKR";
            document.getElementById('total-players').innerText = totalBetsCount;

            const verdict = document.getElementById('final-verdict');
            
            if (bigCash === 0 && smallCash === 0) {
                verdict.innerText = "NO ACTIVE BETS IN THIS ROUND";
                verdict.style.color = "#94a3b8";
            } else if (bigCash < smallCash) {
                verdict.innerText = "LOW POOL: BIG (" + bigCash + " PKR)";
                verdict.style.color = "#818cf8";
            } else if (smallCash < bigCash) {
                verdict.innerText = "LOW POOL: SMALL (" + smallCash + " PKR)";
                verdict.style.color = "#fb923c";
            } else {
                verdict.innerText = "EQUAL POOLS (BALANCED)";
                verdict.style.color = "#f1c40f";
            }
        });
    </script>
</body>
</html>
