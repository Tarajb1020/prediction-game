<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone Pro - Admin Outcome Preview</title>
    
    <!-- Using alternative verified CDNs to avoid any loading blocks -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>
    
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #f1c40f; font-size: 26px; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
        .status { color: #2ecc71; font-size: 14px; margin-bottom: 25px; font-weight: bold; padding: 10px; background: #111827; display: inline-block; border-radius: 8px; }
        .wrapper { max-width: 500px; margin: 0 auto; }
        
        .box {
            background: #1e293b;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            text-align: center;
            margin-bottom: 20px;
        }
        .preview-box { border-top: 6px solid #6366f1; }
        
        .label { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .outcome-display { font-size: 42px; font-weight: 900; margin-top: 15px; letter-spacing: 2px; }
        
        .details-box {
            background: #111827;
            border: 2px dashed #f1c40f;
            border-radius: 15px;
            padding: 20px;
        }
        .details-title { color: #f1c40f; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .details-text { font-size: 18px; color: #fff; margin-top: 8px; font-weight: 600; }
        
        /* Debug error area to show exact database issue on screen */
        #debug-log { margin-top: 20px; color: #ef4444; font-family: monospace; font-size: 12px; white-space: pre-wrap; text-align: left; background: #000; padding: 10px; border-radius: 5px; display: none;}
    </style>
</head>
<body>

    <h1>WIN ZONE OUTCOME PANEL</h1>
    <div class="status" id="net-status">🔄 STEP 1: INITIALIZING SCRIPT...</div>

    <div class="wrapper">
        <div class="box preview-box">
            <div class="label">🎯 NEXT ROUND PREVIEW (LOCKED)</div>
            <div class="outcome-display" id="live-outcome">WAITING...</div>
        </div>

        <div class="details-box">
            <div class="details-title">📋 System Log Message</div>
            <div class="details-text" id="log-message">Awaiting Next Round Data...</div>
        </div>
        
        <div id="debug-log"></div>
    </div>

    <script>
        function showError(msg) {
            const statusEl = document.getElementById('net-status');
            statusEl.innerText = "❌ CONNECTION FAILED";
            statusEl.style.color = "#ef4444";
            
            const debugEl = document.getElementById('debug-log');
            debugEl.style.display = "block";
            debugEl.innerText += msg + "\n";
        }

        try {
            const firebaseConfig = {
                apiKey: "AIzaSyC38KxWq7xJdaadAiF5nfChWyne_iA6vBw",
                authDomain: "winzone-bff7c.firebaseapp.com",
                databaseURL: "https://winzone-bff7c-default-rtdb.firebaseio.com",
                projectId: "winzone-bff7c",
                storageBucket: "winzone-bff7c.firebasestorage.app",
                messagingSenderId: "398802919500",
                appId: "1:398802919500:web:3a80d3f0f8c76786b0d4e9",
                measurementId: "G-1GT4KDJ5YP"
            };
            
            if (typeof firebase === 'undefined') {
                showError("Error: Firebase libraries could not load. Check internet connection or adblocker.");
            } else {
                document.getElementById('net-status').innerText = "🔄 STEP 2: CONNECTING TO WINZONE SERVER...";
                firebase.initializeApp(firebaseConfig);
                
                const database = firebase.database();
                
                // Testing connection state
                database.ref('.info/connected').on('value', (snap) => {
                    if (snap.val() === true) {
                        document.getElementById('net-status').innerText = "🔄 STEP 3: LOGGED IN. FETCHING DATA...";
                    } else {
                        document.getElementById('net-status').innerText = "🔄 STEP 2: DISCONNECTED / RETRYING...";
                    }
                });

                database.ref('admin_controls/auto_preview').on('value', (snapshot) => {
                    const data = snapshot.val();
                    
                    if (data) {
                        document.getElementById('net-status').innerText = "🟢 LIVE FEED ACTIVE";
                        document.getElementById('net-status').style.color = "#2ecc71";
                        
                        const sizeResult = data.size ? data.size.toUpperCase() : "UNKNOWN";
                        const numResult = data.num !== undefined ? `(${data.num})` : "";
                        const fullMessage = data.message || "Result updated by system.";

                        const outcomeDisplay = document.getElementById('live-outcome');
                        outcomeDisplay.innerText = `${sizeResult} ${numResult}`;

                        if (sizeResult === 'BIG') {
                            outcomeDisplay.style.color = "#818cf8"; 
                        } else if (sizeResult === 'SMALL') {
                            outcomeDisplay.style.color = "#fb923c"; 
                        } else {
                            outcomeDisplay.style.color = "#f1c40f"; 
                        }

                        document.getElementById('log-message').innerText = fullMessage;
                    } else {
                        document.getElementById('net-status').innerText = "🟡 CONNECTED BUT NODE IS EMPTY";
                        showError("Database connected but node 'admin_controls/auto_preview' has no values.");
                    }
                }, (error) => {
                    showError("Firebase Error Code: " + error.code + " | Message: " + error.message);
                });
            }
        } catch (e) {
            showError("System Crash: " + e.message);
        }
    </script>
</body>
</html>
