<!DOCTYPE html>

    <style>
        body {

        #appScreen { display: none; }

        .header { background-color: #111827; padding: 18px 15px; font-size: 22px; font-weight: 800; border-bottom: 3px solid #f1c40f; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .header span { color: #f1c40f; }

        .tab-btn.active { background: #f1c40f; color: #000; box-shadow: 0 4px 12px rgba(241, 196, 15, 0.3); }

        .game-wrapper { display: none; }
        .game-wrapper.active { display: block; }

        .promo-banner { background: linear-gradient(90deg, #b91c1c, #4338ca); margin: 15px 20px; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: bold; border: 1px solid #f1c40f; line-height: 1.5; text-align: left; }
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); margin: 15px 20px; padding: 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .wallet-actions { display: flex; justify-content: center; gap: 15px; margin: -5px 20px 15px 20px; }
        .btn-wallet { flex: 1; padding: 12px; font-size: 15px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
        .btn-dep { background: linear-gradient(135deg, #10b981, #059669); color: white; }

        .history-title { font-size: 13px; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .trends-list { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .trend-dot { min-width: 42px; height: 42px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: white; position: relative; box-shadow: 0 2px 6px rgba(0,0,0,0.3); line-height: 1.2; }
        .latest-win-mark { position: absolute; top: -8px; font-size: 9px; background: #f1c40f; color: black; padding: 1px 3px; border-radius: 4px; font-weight: 900; animation: blink 1s infinite; }
        
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        .history-pagination-btn { background: none; border: 1px solid #f1c40f; color: #f1c40f; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: bold; }

        .timer-section { background-color: #1e293b; margin: 15px 20px; padding: 12px; border-radius: 14px; font-size: 18px; color: #f59e0b; font-weight: bold; border: 1px solid #334155; }
        .timer-section span { font-size: 22px; color: #fff; background: #0f172a; padding: 4px 12px; border-radius: 8px; margin-left: 8px; border: 1px solid #f59e0b; }
        .multiplier-container { display: flex; justify-content: center; gap: 8px; margin: 5px 20px 15px 20px; }

        .btn-small { background: linear-gradient(135deg, #f97316, #ea580c); color: white; flex: 1; padding: 16px; font-size: 19px; font-weight: 900; border: none; border-radius: 14px; cursor: pointer; text-transform: uppercase; }

        .bg-green { background: linear-gradient(135deg, #10b981, #059669); }
        .bg-red { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .bg-mix { background: linear-gradient(135deg, #8b5cf6, #ec4899); border: 1px dashed #fff; }

        /* ==================== SCREENSHOT MATCHING AVIATOR UI ==================== */

        #aviatorCanvas { width: 100%; height: 100%; display: block; }
        
        .live-multiplier { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: 900; color: #fff; font-family: sans-serif; pointer-events: none; }
        .aviator-alert-overlay { position: absolute; top: 70%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; font-weight: 800; text-transform: uppercase; padding: 5px 15px; border-radius: 6px; display: none; pointer-events: none; }
        .flew-away-text { color: #ffffff; background: #cb1c45; border: 1px solid #ef4444; box-shadow: 0 0 12px #cb1c45; }
        .waiting-text { color: #f59e0b; background: rgba(245, 158, 11, 0.2); border: 1px solid #f59e0b; font-size: 16px; }

        .aviator-box-panel { background: #1b1c22; padding: 12px; border-radius: 12px; border: 1px solid #2e313e; display: flex; flex-direction: column; gap: 8px; }

        .av-bet-controls span { font-size: 12px; color: #94a3b8; font-weight: bold; }
        .av-bet-controls input { width: 90px; padding: 6px; font-weight: 900; margin: 0; color: #26e67f; font-size: 14px; border: none; background: transparent; text-align: right; }

        /* Original Style Big Green and Orange Buttons */
        .av-main-action-btn { width: 100%; padding: 14px; font-size: 18px; font-weight: 900; border-radius: 12px; border: none; cursor: pointer; text-transform: uppercase; color: white; display: block; box-sizing: border-box; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        .av-btn-green { background: linear-gradient(to bottom, #2cde76, #11914f); border-bottom: 3px solid #08592f; }
        .av-btn-orange { background: linear-gradient(to bottom, #ff9000, #cc4b00); border-bottom: 3px solid #802a00; }
        .av-btn-grey { background: #27272a; color: #71717a; cursor: not-allowed; border-bottom: 3px solid #18181b; }

        .aviator-status-footer { background: #07080a; border: 1px solid #27272a; color: #94a3b8; font-size: 11px; font-weight: bold; padding: 8px; border-radius: 8px; text-transform: uppercase; }

        input[type="number"], input[type="text"], input[type="email"], input[type="password"], select { padding: 12px; font-size: 15px; border-radius: 10px; border: 1px solid #334155; background-color: #0f172a; color: white; width: 100%; max-width: 280px; text-align: center; margin-bottom: 12px; box-sizing: border-box; }
        .status-display { background-color: #111827; border: 1px dashed #334155; padding: 12px; margin: 15px 20px; border-radius: 12px; font-size: 14px; color: #94a3b8; font-weight: bold; }
        .logs { background-color: #1e293b; margin: 20px; padding: 12px; border-radius: 12px; text-align: left; max-height: 110px; overflow-y: auto; font-size: 13px; color: #cbd5e1; border: 1px solid #334155; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; padding: 15px; box-sizing: border-box; }
        .modal-content { background-color: #1e293b; padding: 25px 20px; border-radius: 24px; width: 100%; max-width: 360px; border: 1px solid #475569; text-align: center; }
        .submit-btn { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .close-btn { background-color: #475569; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; margin-top: 12px; width: 100%; }
        .switch-auth { color: #38bdf8; cursor: pointer; text-decoration: underline; margin-top: 15px; font-size: 13px; display: inline-block; }
    </style>
</head>
