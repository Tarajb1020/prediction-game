<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone Pro - Admin Analytics Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #f1c40f; font-size: 26px; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
        .status { color: #2ecc71; font-size: 13px; margin-bottom: 25px; font-weight: bold; letter-spacing: 0.5px; }
        .wrapper { max-width: 500px; margin: 0 auto; }
        
        .grid-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .box {
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            text-align: center;
        }
        .big-box { border-top: 6px solid #6366f1; }
        .small-box { border-top: 6px solid #f97316; }
        .stats-box { border-top: 6px solid #10b981; grid-column: span 2; }
        
        .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .money { font-size: 28px; font-weight: 900; margin-top: 5px; }
        
        #big-money { color: #818cf8; }
        #small-money { color: #fb923c; }
        #total-players { color: #34d399; }
        
        .decision-box {
            background: #111827;
            border: 2px dashed #f1c40f;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .decision-title { color: #f1c40f; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .kill-target { font-size: 20px; font-weight: 900; color: #fff; margin-top: 8px; }
    </style>
</head>
<body>

    <h1>WIN ZONE ADMIN PANEL</h1>
    <div class="status" id="net-status">🔄 CONNECTING LIVE DATABASE...</div>

    <div class="wrapper">
        <div class="grid-box">
            <div class="box big-box">
                <div class="label">Total On BIG</div>
                <div class="money" id="big-money">0 PKR</div>
            </div>

            <div class="box small-box">
                <div class="label">Total On SMALL</div>
                <div class="money" id="small-money">0 PKR</div>
            </div>

            <div class="box stats-box">
                <div class="label">Active Bets Count</div>
                <div class="money" id="total-players">0</div>
            </div>
        </div>

        <div class="decision-box">
            <div class="decision-title">📊 Analytics Pool Summary</div>
            <div class="kill-target" id="final-verdict">LOADING LIVE ROUND...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC38KxWq7xJdaadAiF5nfChWyne_iA6vBw",
            authDomain: "winzone-bff7c.firebaseapp.com",
            databaseURL: "https://winzone-bff7c-default-rtdb.firebaseio.com",
            projectId: "winzone-bff7c",
            storageBucket: "winzone-bff7c.firebasestorage.app",
            messagingSenderId: "398802919500",
            appId: "1:398802919500:web:3a80d3f0f8c76786b0d4e9",
            measurementId: "G-1GT4KDJ5YP"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // UPDATED: Dynamic checker fallback if global_active_round_pool is empty
        function listenToNode(nodeName) {
            database.ref(nodeName).on('value', (snapshot) => {
                const betsData = snapshot.val() || {};
                
                let bigCash = 0;
                let smallCash = 0;
                let totalBetsCount = 0;
                let hasData = false;

                Object.keys(betsData).forEach(key => {
                    const bet = betsData[key];
                    hasData = true;
                    
                    if (bet && typeof bet === 'object') {
                        totalBetsCount++;
                        let actualAmount = parseInt(bet.amount || bet.bet_amount || bet.cash || 0);

                        if (bet.value === 'Big' || bet.type === 'Big' || bet.bet === 'Big' || bet.selection === 'Big') {
                            bigCash += actualAmount;
                        } else if (bet.value === 'Small' || bet.type === 'Small' || bet.bet === 'Small' || bet.selection === 'Small') {
                            smallCash += actualAmount;
                        }
                    } else {
                        if (key === 'Big' || key === 'big') bigCash = parseInt(bet) || 0;
                        if (key === 'Small' || key === 'small') smallCash = parseInt(bet) || 0;
                    }
                });

                // If this node has no data, fallback to alternative nodes instantly
                if (!hasData && nodeName === 'global_active_round_pool') {
                    listenToNode('wingo_current_round');
                    return;
                } else if (!hasData && nodeName === 'wingo_current_round') {
                    listenToNode('wingo_bets');
                    return;
                }

                document.getElementById('net-status').innerText = `🟢 LIVE MONITOR: ACTIVE (${nodeName.toUpperCase()})`;
                
                // Updating UI
                document.getElementById('big-money').innerText = bigCash.toLocaleString() + " PKR";
                document.getElementById('small-money').innerText = smallCash.toLocaleString() + " PKR";
                document.getElementById('total-players').innerText = totalBetsCount > 0 ? totalBetsCount : (bigCash > 0 || smallCash > 0 ? "Active" : "0");

                const verdict = document.getElementById('final-verdict');
                if (bigCash === 0 && smallCash === 0) {
                    verdict.innerText = "NO ACTIVE BETS IN THIS ROUND";
                    verdict.style.color = "#94a3b8";
                } else if (bigCash < smallCash) {
                    verdict.innerText = "LOW POOL: BIG (" + bigCash.toLocaleString() + " PKR)";
                    verdict.style.color = "#818cf8";
                } else if (smallCash < bigCash) {
                    verdict.innerText = "LOW POOL: SMALL (" + smallCash.toLocaleString() + " PKR)";
                    verdict.style.color = "#fb923c";
                } else {
                    verdict.innerText = "EQUAL POOLS (BALANCED)";
                    verdict.style.color = "#f1c40f";
                }
            }, (error) => {
                document.getElementById('net-status').innerText = "❌ ERROR: " + error.message;
            });
        }

        // Start listening
        listenToNode('global_active_round_pool');
    </script>
</body>
</html>
