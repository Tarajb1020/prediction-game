<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone - Advanced Admin Panel</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #58a6ff; margin-bottom: 5px; font-size: 24px; }
        .subtitle { color: #8b949e; margin-bottom: 20px; font-size: 13px; }
        .dashboard-container { width: 100%; max-width: 500px; }
        
        .section-title {
            font-size: 14px;
            color: #ffd33d;
            text-transform: uppercase;
            margin: 15px 0 8px 0;
            letter-spacing: 1px;
            font-weight: bold;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        
        .card h3 { margin: 0 0 5px 0; font-size: 14px; color: #8b949e; }
        .card .amount { font-size: 18px; font-weight: bold; }
        
        /* Colors styling */
        .c-red { border-left: 4px solid #db4455; }
        .c-green { border-left: 4px solid #2ea043; }
        .c-violet { border-left: 4px solid #9c27b0; }
        .c-red .amount { color: #ff6b7b; }
        .c-green .amount { color: #56d364; }
        .c-violet .amount { color: #e040fb; }
        
        /* Size styling */
        .s-big { border-left: 4px solid #2196f3; }
        .s-small { border-left: 4px solid #ff9800; }
        .s-big .amount { color: #40c4ff; }
        .s-small .amount { color: #ffd740; }
        
        .signal-box {
            background: #21262d;
            border: 1px solid #30363d;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .signal-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 15px;
        }
        .target { font-weight: bold; color: #ffd33d; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <h1>Win Zone Admin</h1>
    <div class="subtitle">Live Colors & Sizes Betting Tracker</div>

    <div class="dashboard-container">
        
        <!-- COLOR SECTION -->
        <div class="section-title">Color Bets</div>
        <div class="card-grid">
            <div class="card c-red">
                <h3>Red</h3>
                <div class="amount" id="red-total">0 PKR</div>
            </div>
            <div class="card c-green">
                <h3>Green</h3>
                <div class="amount" id="green-total">0 PKR</div>
            </div>
            <div class="card c-violet">
                <h3>Violet</h3>
                <div class="amount" id="violet-total">0 PKR</div>
            </div>
        </div>

        <!-- SIZE SECTION -->
        <div class="section-title">Size Bets</div>
        <div class="card-grid">
            <div class="card s-big">
                <h3>Big</h3>
                <div class="amount" id="big-total">0 PKR</div>
            </div>
            <div class="card s-small">
                <h3>Small</h3>
                <div class="amount" id="small-total">0 PKR</div>
            </div>
        </div>

        <!-- SIGNAL RECOMMENDATION -->
        <div class="section-title">Safe Winning Target</div>
        <div class="signal-box">
            <div class="signal-row">
                <span>Best Color to Win:</span>
                <span class="target" id="best-color">No Bets</span>
            </div>
            <div class="signal-row">
                <span>Best Size to Win:</span>
                <span class="target" id="best-size">No Bets</span>
            </div>
        </div>
        
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://winzone-bff7c-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Live Bets track karne ke liye (Aapke database structure ke mutabiq keys)
        database.ref('current_round/bets').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // Firebase se data uthana (Agar aapke database keys ka naam change hai toh yahan badal sakte hain)
            const red = data.red || 0;
            const green = data.green || 0;
            const violet = data.violet || 0;
            const big = data.big || 0;
            const small = data.small || 0;

            // Numbers update karna screen par
            document.getElementById('red-total').innerText = red + " PKR";
            document.getElementById('green-total').innerText = green + " PKR";
            document.getElementById('violet-total').innerText = violet + " PKR";
            document.getElementById('big-total').innerText = big + " PKR";
            document.getElementById('small-total').innerText = small + " PKR";

            // COLOR LOGIC: Jis taraf sabse kam paisa laga ho
            const colorTarget = document.getElementById('best-color');
            if(red === 0 && green === 0 && violet === 0) {
                colorTarget.innerText = "Waiting for bets...";
                colorTarget.style.color = "#ffd33d";
            } else {
                let minColor = "RED";
                let minVal = red;
                if(green < minVal) { minColor = "GREEN"; minVal = green; }
                if(violet < minVal) { minColor = "VIOLET"; minVal = violet; }
                colorTarget.innerText = minColor + " (Kam Bet)";
                colorTarget.style.color = minColor === "RED" ? "#ff6b7b" : (minColor === "GREEN" ? "#56d364" : "#e040fb");
            }

            // SIZE LOGIC: Jis taraf kam paisa laga ho
            const sizeTarget = document.getElementById('best-size');
            if(big === 0 && small === 0) {
                sizeTarget.innerText = "Waiting for bets...";
                sizeTarget.style.color = "#ffd33d";
            } else if(big < small) {
                sizeTarget.innerText = "BIG (Kam Bet)";
                sizeTarget.style.color = "#40c4ff";
            } else if(small < big) {
                sizeTarget.innerText = "SMALL (Kam Bet)";
                sizeTarget.style.color = "#ffd740";
            } else {
                sizeTarget.innerText = "Equal Bets";
                sizeTarget.style.color = "#ffd33d";
            }
        });
    </script>
</body>
</html>
