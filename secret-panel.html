<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone Pro - Accurate Money Router</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #f1c40f; font-size: 24px; margin-bottom: 5px; font-weight: 800; }
        .status { color: #2ecc71; font-size: 12px; margin-bottom: 25px; font-weight: bold; }
        .wrapper { max-width: 400px; margin: 0 auto; }
        
        .box {
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        .big-box { border-left: 6px solid #6366f1; }
        .small-box { border-left: 6px solid #f97316; }
        
        .label { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .money { font-size: 34px; font-weight: 900; margin-top: 5px; }
        
        #big-money { color: #818cf8; }
        #small-money { color: #fb923c; }
        
        .decision-box {
            background: #111827;
            border: 2px dashed #f1c40f;
            border-radius: 15px;
            padding: 15px;
            margin-top: 25px;
        }
        .decision-title { color: #f1c40f; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .kill-target { font-size: 22px; font-weight: 900; color: #fff; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>WIN ZONE REAL MONEY MONITOR</h1>
    <div class="status" id="net-status">🔄 CONNECTING LIVE LIQUIDITY FLOW...</div>

    <div class="wrapper">
        <div class="box big-box">
            <div class="label">Total Money on BIG</div>
            <div class="money" id="big-money">0 PKR</div>
        </div>

        <div class="box small-box">
            <div class="label">Total Money on SMALL</div>
            <div class="money" id="small-money">0 PKR</div>
        </div>

        <div class="decision-box">
            <div class="decision-title">🔮 SMART ACCURATE RESULT PREDICTION</div>
            <div class="kill-target" id="final-verdict">WAITING FOR LIVE ROUND...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://winzone-bff7c-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // FIXED: Reading direct active live bets instead of static game history
        database.ref('wingo_bets').on('value', (snapshot) => {
            const betsData = snapshot.val() || {};
            document.getElementById('net-status').innerText = "🟢 PURE REAL-TIME MONITOR ACTIVE";
            
            let bigCash = 0;
            let smallCash = 0;

            Object.keys(betsData).forEach(key => {
                const bet = betsData[key];
                
                // Pure filtration: checking actual numeric amounts linked by users
                let actualAmount = 0;
                if(bet.amount) {
                    actualAmount = parseInt(bet.amount);
                }

                // Sorting based on live value selected by the user
                if (bet.value === 'Big' || bet.type === 'Big') {
                    bigCash += actualAmount;
                } else if (bet.value === 'Small' || bet.type === 'Small') {
                    smallCash += actualAmount;
                }
            });

            // Update UI screens with strict live numbers
            document.getElementById('big-money').innerText = bigCash + " PKR";
            document.getElementById('small-money').innerText = smallCash + " PKR";

            // Safe logic routing output
            const verdict = document.getElementById('final-verdict');
            if (bigCash === 0 && smallCash === 0) {
                verdict.innerText = "NO ACTIVE STAKES";
                verdict.style.color = "#94a3b8";
            } else if (bigCash < smallCash) {
                verdict.innerText = "👉 BIG PAR KAM PAISA HAI (WIN BIG)";
                verdict.style.color = "#818cf8";
            } else if (smallCash < bigCash) {
                verdict.innerText = "👉 SMALL PAR KAM PAISA HAI (WIN SMALL)";
                verdict.style.color = "#fb923c";
            } else {
                verdict.innerText = "POOLS BALANCED (ANY RESULT)";
                verdict.style.color = "#f1c40f";
            }
        });
    </script>
</body>
</html>
