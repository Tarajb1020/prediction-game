<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone Pro - Admin God Mode v4.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #0b0f19; color: white; text-align: center; }
        #appScreen { display: none; }
        .auth-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #0b0f19; }
        .auth-card { background-color: #1e293b; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { background-color: #111827; padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 3px solid #f1c40f; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .balance-card { background: linear-gradient(135deg, #1e293b, #0f172a); margin: 15px; padding: 20px; border-radius: 16px; border: 1px solid #334155; }
        .wallet-actions { display: flex; gap: 10px; margin: 15px; }
        .btn-wallet { flex: 1; padding: 12px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }
        .btn-dep { background: #10b981; color: white; }
        .btn-with { background: #0284c7; color: white; }
        .timer-section { background-color: #1e293b; margin: 15px; padding: 15px; border-radius: 12px; font-size: 18px; color: #f59e0b; font-weight: bold; }
        .timer-section span { font-size: 24px; color: #fff; background: #0f172a; padding: 4px 10px; border-radius: 6px; margin-left: 5px; }
        .game-section-label { font-size: 12px; color: #f1c40f; text-align: left; margin: 15px; font-weight: bold; text-transform: uppercase; }
        .big-small-container, .color-selection-bar { display: flex; gap: 15px; margin: 10px; }
        .btn-big { background: #6366f1; color: white; flex: 1; padding: 14px; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
        .btn-small { background: #f97316; color: white; flex: 1; padding: 14px; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
        .color-choice-btn { flex: 1; padding: 12px; font-weight: bold; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .choice-red { background: #ef4444; }
        .choice-green { background: #10b981; }
        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 10px; }
        .num-btn { padding: 10px 0; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; background: #334155; }
        .logs { background-color: #111622; margin: 15px; padding: 12px; border-radius: 12px; text-align: left; border: 1px solid #233146; }
        .live-bet-card { display: flex; justify-content: space-between; background: #1c2333; padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 20px; width: 90%; max-width: 340px; text-align: center; border: 2px solid #475569; }
        .submit-btn { background: #10b981; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .close-btn { background: #475569; color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; margin-top: 10px; width: 100%; }
        input { padding: 10px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="auth-container">
        <div id="loginCard" class="auth-card">
            <h2 style="color:#f1c40f;">WIN ZONE LOGIN</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button class="submit-btn" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="appScreen">
        <div class="header">
            <span>👑 WIN ZONE CONTROL v4.0</span>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="balance-card">
            <div style="font-size: 12px; opacity: 0.7;">YOUR BALANCE (ADMIN 10% FEE ACTIVE)</div>
            <div id="balance" style="font-size: 32px; font-weight: 900; color: #f1c40f;">PKR 0</div>
        </div>

        <div class="wallet-actions">
            <button class="btn-wallet btn-dep" onclick="openModal('depositModal')">Deposit</button>
            <button class="btn-wallet btn-with" onclick="openModal('withdrawModal')">Withdraw</button>
        </div>

        <div class="timer-section">
            ⏱️ Round Ends In: <span id="timer">00:30</span>
        </div>

        <div id="roundStatus" style="margin: 10px; font-weight: bold; color: #94a3b8;">
            Place your bets. Real-time anti-loss shield active.
        </div>

        <div>
            <label style="font-size: 12px; color: #94a3b8;">STAKE VALUE:</label>
            <input type="number" id="betAmount" value="50" style="width: 100px; font-weight: bold;">
        </div>

        <div class="game-section-label">⚡ Size Control</div>
        <div class="big-small-container">
            <button class="btn-big" onclick="placeBet('size', 'Big')">Big</button>
            <button class="btn-small" onclick="placeBet('size', 'Small')">Small</button>
        </div>

        <div class="game-section-label">🎨 Color Control</div>
        <div class="color-selection-bar">
            <button class="color-choice-btn choice-red" onclick="placeBet('color', 'Red')">Red</button>
            <button class="color-choice-btn choice-green" onclick="placeBet('color', 'Green')">Green</button>
        </div>

        <div class="game-section-label">🔢 Numbers</div>
        <div class="number-grid">
            <button class="num-btn" onclick="placeBet('number', 0)">0</button>
            <button class="num-btn" onclick="placeBet('number', 1)">1</button>
            <button class="num-btn" onclick="placeBet('number', 2)">2</button>
            <button class="num-btn" onclick="placeBet('number', 3)">3</button>
            <button class="num-btn" onclick="placeBet('number', 4)">4</button>
            <button class="num-btn" onclick="placeBet('number', 5)">5</button>
            <button class="num-btn" onclick="placeBet('number', 6)">6</button>
            <button class="num-btn" onclick="placeBet('number', 7)">7</button>
            <button class="num-btn" onclick="placeBet('number', 8)">8</button>
            <button class="num-btn" onclick="placeBet('number', 9)">9</button>
        </div>

        <div class="logs">
            <div style="font-size: 12px; color: #f1c40f; font-weight: bold; margin-bottom: 5px;">📡 YOUR CURRENT LIVE BETS</div>
            <div id="activeBetsPanel"></div>
        </div>
    </div>

    <!-- NOTIFICATION MODAL -->
    <div id="resultModal" class="modal">
        <div class="modal-content" id="resultModalContent">
            <h2 id="resultHeader"></h2>
            <div id="resultDetails" style="margin: 15px 0; font-weight: bold;"></div>
            <button class="submit-btn" onclick="closeModal('resultModal')">OK</button>
        </div>
    </div>

    <div id="depositModal" class="modal"><div class="modal-content"><h3>Deposit</h3><input type="number" placeholder="Amount"><button class="submit-btn" onclick="closeModal('depositModal'); alert('Sent to admin!');">Submit</button><button class="close-btn" onclick="closeModal('depositModal')">Close</button></div></div>
    <div id="withdrawModal" class="modal"><div class="modal-content"><h3>Withdraw</h3><input type="number" placeholder="Amount"><button class="submit-btn" onclick="closeModal('withdrawModal'); alert('Requested!');">Request</button><button class="close-btn" onclick="closeModal('withdrawModal')">Close</button></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC38KxWq7xJdaadAiF5nfChWyne_iA6vBw",
            authDomain: "winzone-bff7c.firebaseapp.com",
            databaseURL: "https://winzone-bff7c-default-rtdb.firebaseio.com",
            projectId: "winzone-bff7c",
            storageBucket: "winzone-bff7c.firebasestorage.app",
            messagingSenderId: "398802919500",
            appId: "1:398802919500:web:3a80d3f0f8c76786b0d4e9"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUser = null;
        let currentBalance = 0;
        let timeLeft = 30;
        let activeWingoBets = [];

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if(email && password) { auth.signInWithEmailAndPassword(email, password).then(() => { showDashboard(); }).catch(e => alert(e.message)); }
        }

        function showDashboard() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user; showDashboard();
                database.ref('users/' + user.uid).on('value', (snapshot) => {
                    let data = snapshot.val();
                    if(data) { currentBalance = data.balance || 0; document.getElementById('balance').innerText = `PKR ${currentBalance}`; }
                });
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appScreen').style.display = 'none';
            }
        });

        function handleLogout() { auth.signOut().then(() => location.reload()); }

        function placeBet(category, value) {
            let amount = parseInt(document.getElementById('betAmount').value);
            if (isNaN(amount) || amount < 15 || amount > currentBalance) { alert("Insufficient Balance or Invalid Amount!"); return; }
            
            // Mutual Exclusion Rules
            if (category === 'size') {
                let conf = value === 'Big' ? 'Small' : 'Big';
                if (activeWingoBets.some(b => b.category === 'size' && b.value === conf)) { alert("Both Big & Small not allowed!"); return; }
            }
            if (category === 'color') {
                let conf = value === 'Red' ? 'Green' : 'Red';
                if (activeWingoBets.some(b => b.category === 'color' && b.value === conf)) { alert("Both Colors not allowed!"); return; }
                if (activeWingoBets.some(b => b.category === 'number')) { alert("Cannot bet on Color while Number bet is active!"); return; }
            }
            if (category === 'number' && activeWingoBets.some(b => b.category === 'color')) {
                alert("Cannot bet on Number while Color bet is active!"); return;
            }

            // Immediately lock/deduct balance in local & DB to stop multi-click glitches
            currentBalance -= amount;
            database.ref('users/' + currentUser.uid).update({ balance: currentBalance });
            
            activeWingoBets.push({ category: category, value: value, amount: amount });
            renderLiveRoutingUi();
        }

        function renderLiveRoutingUi() {
            const panel = document.getElementById('activeBetsPanel'); panel.innerHTML = '';
            activeWingoBets.forEach(bet => {
                panel.innerHTML += `<div class="live-bet-card"><span><b>${bet.value}</b> (${bet.category.toUpperCase()})</span><span style="color:#f1c40f;">PKR ${bet.amount}</span></div>`;
            });
        }

        // --- HARD RIGGED ADMIN-PROFIT ENGINE CONTROLLER ---
        setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                let finalSizeResult = 'Big';
                let finalNumberResult = 7;
                let finalColorResult = 'Red';

                // HARD ALGORITHM: Agar user ne koi bet lagayi hui hai, to system check karega ke use kaise harana hai!
                if (activeWingoBets.length > 0) {
                    let hasBigBet = activeWingoBets.some(b => b.category === 'size' && b.value === 'Big');
                    let hasSmallBet = activeWingoBets.some(b => b.category === 'size' && b.value === 'Small');
                    let hasRedBet = activeWingoBets.some(b => b.category === 'color' && b.value === 'Red');
                    let hasGreenBet = activeWingoBets.some(b => b.category === 'color' && b.value === 'Green');

                    // Kill Matrix Logic: Phele se hi result ko badal do jahan user loss kare
                    if (hasBigBet && hasRedBet) {
                        // User ne Big aur Red lagaya tha? To system Small aur Green nikaal dega (e.g., Number 1, 3)
                        finalNumberResult = 3; finalSizeResult = 'Small'; finalColorResult = 'Green';
                    } else if (hasSmallBet && hasGreenBet) {
                        // User ne Small aur Green lagaya? To system Big aur Red nikaal dega (e.g., Number 6, 8)
                        finalNumberResult = 8; finalSizeResult = 'Big'; finalColorResult = 'Red';
                    } else if (hasBigBet) {
                        finalNumberResult = 2; finalSizeResult = 'Small'; finalColorResult = 'Red';
                    } else if (hasSmallBet) {
                        finalNumberResult = 7; finalSizeResult = 'Big'; finalColorResult = 'Red';
                    } else if (hasRedBet) {
                        finalNumberResult = 1; finalSizeResult = 'Small'; finalColorResult = 'Green';
                    } else if (hasGreenBet) {
                        finalNumberResult = 6; finalSizeResult = 'Big'; finalColorResult = 'Red';
                    }
                } else {
                    // Agar koi bet nahi lagi, to pure random chalao
                    finalSizeResult = Math.random() > 0.5 ? 'Big' : 'Small';
                    finalNumberResult = finalSizeResult === 'Big' ? [6,7,8,9][Math.floor(Math.random()*4)] : [1,2,3,4][Math.floor(Math.random()*4)];
                    finalColorResult = [2,4,6,8].includes(finalNumberResult) ? 'Red' : 'Green';
                }

                let totalPayoutToGive = 0;
                let detailsHtml = "";

                activeWingoBets.forEach(bet => {
                    let isWin = false;
                    let mult = 2;
                    if (bet.category === 'size' && bet.value === finalSizeResult) isWin = true;
                    if (bet.category === 'color' && bet.value === finalColorResult) isWin = true;
                    if (bet.category === 'number' && parseInt(bet.value) === finalNumberResult) { isWin = true; mult = 9; }

                    if (isWin) {
                        // ADMIN 10% TAX CUT ENGINE: 100% payout ki bjay sirf 90% calculate hoga!
                        let grossWin = bet.amount * mult;
                        let netWinWithTax = Math.floor(grossWin * 0.90); 
                        totalPayoutToGive += netWinWithTax;
                        detailsHtml += `<p style="color:#10b981;">✅ ${bet.value} Won: +PKR ${netWinWithTax} (10% Tax Deducted)</p>`;
                    } else {
                        detailsHtml += `<p style="color:#ef4444;">❌ ${bet.value} Lost: -PKR ${bet.amount}</p>`;
                    }
                });

                // Database balance final point update strictly once
                if (totalPayoutToGive > 0) {
                    currentBalance += totalPayoutToGive;
                    database.ref('users/' + currentUser.uid).child('balance').set(currentBalance);
                }

                // Show visual outcome
                const modal = document.getElementById('resultModal');
                const header = document.getElementById('resultHeader');
                const details = document.getElementById('resultDetails');
                
                header.innerText = totalPayoutToGive > 0 ? "ROUND RESULTS" : "YOU LOST";
                header.style.color = totalPayoutToGive > 0 ? "#10b981" : "#ef4444";
                details.innerHTML = `
                    <div style="background:#0f172a; padding:10px; border-radius:8px; margin-bottom:10px;">
                        🎯 Result: <b>${finalNumberResult} (${finalColorResult} / ${finalSizeResult})</b>
                    </div>
                    ${detailsHtml}
                `;
                openModal('resultModal');

                document.getElementById('roundStatus').innerHTML = `Last Result: ${finalNumberResult} [${finalSizeResult}]`;
                activeWingoBets = [];
                document.getElementById('activeBetsPanel').innerHTML = '';
                timeLeft = 30;
            }
            document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        }, 1000);

        function openModal(id) { document.getElementById(id).style.display = "flex"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
    </script>
</body>
</html>
