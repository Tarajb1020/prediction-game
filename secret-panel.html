<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone Pro - Money Counter</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            background-color: #060b13;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #f1c40f; font-size: 24px; margin-bottom: 5px; }
        .status { color: #2ecc71; font-size: 12px; margin-bottom: 25px; font-weight: bold; }
        .wrapper { max-width: 400px; margin: 0 auto; }
        
        .box {
            background: #111a2e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .big-box { border-left: 6px solid #4f46e5; }
        .small-box { border-left: 6px solid #f97316; }
        
        .label { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .money { font-size: 32px; font-weight: 900; margin-top: 5px; }
        
        #big-money { color: #818cf8; }
        #small-money { color: #fb923c; }
        
        .decision-box {
            background: #1e1b4b;
            border: 2px dashed #f1c40f;
            border-radius: 15px;
            padding: 15px;
            margin-top: 25px;
        }
        .decision-title { color: #f1c40f; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .kill-target { font-size: 22px; font-weight: 900; color: #fff; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>WIN ZONE MONEY TRACKER</h1>
    <div class="status" id="net-status">🔄 FILTERING DATABASE FOR CASH POOLS...</div>

    <div class="wrapper">
        <!-- BIG MONEY POOL -->
        <div class="box big-box">
            <div class="label">Total Money on BIG</div>
            <div class="money" id="big-money">0 PKR</div>
        </div>

        <!-- SMALL MONEY POOL -->
        <div class="box small-box">
            <div class="label">Total Money on SMALL</div>
            <div class="money" id="small-money">0 PKR</div>
        </div>

        <!-- DIRECT LIVE ADVICE -->
        <div class="decision-box">
            <div class="decision-title">⚠️ WINNER TARGET (LESSER MONEY POOL)</div>
            <div class="kill-target" id="final-verdict">WAITING FOR BETS...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://winzone-bff7c-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Direct users root node ko scan karna jahan har user ka current round amount save hota hai
        database.ref('users').on('value', (snapshot) => {
            const usersData = snapshot.val() || {};
            document.getElementById('net-status').innerText = "🟢 MONITORING LIVE USER BETS (PKR)";
            
            let totalBigMoney = 0;
            let totalSmallMoney = 0;

            // Loop through all registered users inside database
            Object.keys(usersData).forEach(uid => {
                const user = usersData[uid];
                
                // Agar user ne is round mein bet lagayi hui hai
                if (user.active_bet || user.current_bet || user.bet) {
                    const betDetails = user.active_bet || user.current_bet || user.bet;
                    const amount = parseInt(betDetails.amount || betDetails.money || betDetails.bet_amount || 0);
                    const choice = betDetails.size || betDetails.type || betDetails.select;

                    if (choice === 'Big' || choice === 'big' || choice === 'BIG') {
                        totalBigMoney += amount;
                    }
                    if (choice === 'Small' || choice === 'small' || choice === 'SMALL') {
                        totalSmallMoney += amount;
                    }
                }
                
                // Alternate Check: Agar amount drect user level par save ho rahi ho bina nested object ke
                if (user.current_choice && user.current_amount) {
                    const amount = parseInt(user.current_amount || 0);
                    if (user.current_choice === 'Big') totalBigMoney += amount;
                    if (user.current_choice === 'Small') totalSmallMoney += amount;
                }
            });

            // Update Screen Numbers
            document.getElementById('big-money').innerText = totalBigMoney + " PKR";
            document.getElementById('small-money').innerText = totalSmallMoney + " PKR";

            // Final Decision Logic based on money pool
            const verdict = document.getElementById('final-verdict');
            if (totalBigMoney === 0 && totalSmallMoney === 0) {
                verdict.innerText = "NO ACTIVE PKR ON BOARD";
                verdict.style.color = "#94a3b8";
            } else if (totalBigMoney < totalSmallMoney) {
                verdict.innerText = "👉 OPEN BIG (Safe Win)";
                verdict.style.color = "#818cf8";
            } else if (totalSmallMoney < totalBigMoney) {
                verdict.innerText = "👉 OPEN SMALL (Safe Win)";
                verdict.style.color = "#fb923c";
            } else {
                verdict.innerText = "EQUAL POOLS (ANY RESULT)";
                verdict.style.color = "#f1c40f";
            }
        });
    </script>
</body>
</html>
