<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone Pro - Admin Outcome Preview</title>
    
    <!-- Latest Stable Firebase v10 Libraries (Modular but using compat layer for easy browser use) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #f1c40f; font-size: 26px; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
        .status { color: #2ecc71; font-size: 13px; margin-bottom: 25px; font-weight: bold; letter-spacing: 0.5px; }
        .wrapper { max-width: 500px; margin: 0 auto; }
        
        .box {
            background: #1e293b;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            text-align: center;
            margin-bottom: 20px;
        }
        .preview-box { border-top: 6px solid #6366f1; }
        
        .label { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .outcome-display { font-size: 42px; font-weight: 900; margin-top: 15px; letter-spacing: 2px; }
        
        .details-box {
            background: #111827;
            border: 2px dashed #f1c40f;
            border-radius: 15px;
            padding: 20px;
        }
        .details-title { color: #f1c40f; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .details-text { font-size: 18px; color: #fff; margin-top: 8px; font-weight: 600; }
    </style>
</head>
<body>

    <h1>WIN ZONE OUTCOME PANEL</h1>
    <div class="status" id="net-status">🔄 CONNECTING TO FIREBASE...</div>

    <div class="wrapper">
        <div class="box preview-box">
            <div class="label">🎯 NEXT ROUND PREVIEW (LOCKED)</div>
            <div class="outcome-display" id="live-outcome">WAITING...</div>
        </div>

        <div class="details-box">
            <div class="details-title">📋 System Log Message</div>
            <div class="details-text" id="log-message">Awaiting Next Round Data...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC38KxWq7xJdaadAiF5nfChWyne_iA6vBw",
            authDomain: "winzone-bff7c.firebaseapp.com",
            databaseURL: "https://winzone-bff7c-default-rtdb.firebaseio.com",
            projectId: "winzone-bff7c",
            storageBucket: "winzone-bff7c.firebasestorage.app",
            messagingSenderId: "398802919500",
            appId: "1:398802919500:web:3a80d3f0f8c76786b0d4e9",
            measurementId: "G-1GT4KDJ5YP"
        };
        
        // Initialize Firebase safely
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const database = firebase.database();

        // Listen for data from admin_controls/auto_preview
        database.ref('admin_controls/auto_preview').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                document.getElementById('net-status').innerText = "🟢 LIVE FEED ACTIVE";
                document.getElementById('net-status').style.color = "#2ecc71";
                
                // Extract size/outcome
                const sizeResult = data.size ? data.size.toUpperCase() : "UNKNOWN";
                const numResult = data.num !== undefined ? `(${data.num})` : "";
                const fullMessage = data.message || "Result updated by system.";

                const outcomeDisplay = document.getElementById('live-outcome');
                outcomeDisplay.innerText = `${sizeResult} ${numResult}`;

                // Dynamic color based on outcome
                if (sizeResult === 'BIG') {
                    outcomeDisplay.style.color = "#818cf8"; 
                } else if (sizeResult === 'SMALL') {
                    outcomeDisplay.style.color = "#fb923c"; 
                } else {
                    outcomeDisplay.style.color = "#f1c40f"; 
                }

                document.getElementById('log-message').innerText = fullMessage;
            } else {
                document.getElementById('net-status').innerText = "🟡 CONNECTED BUT NO DATA FOUND";
                document.getElementById('net-status').style.color = "#f1c40f";
                document.getElementById('live-outcome').innerText = "NO DATA";
                document.getElementById('live-outcome').style.color = "#94a3b8";
                document.getElementById('log-message').innerText = "Waiting for game backend to push result...";
            }
        }, (error) => {
            console.error("Firebase Error: ", error);
            document.getElementById('net-status').innerText = "❌ ERROR: " + error.message;
            document.getElementById('net-status').style.color = "#ef4444";
        });
    </script>
</body>
</html>
