<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone - Prediction Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
        }
        .header {
            background-color: #1f1f1f;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px solid #333;
        }
        .balance-card {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            margin: 20px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .timer-section {
            font-size: 24px;
            margin: 20px 0;
            color: #f1c40f;
        }
        .color-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-red { background-color: #e74c3c; color: white; }
        .btn-green { background-color: #2ecc71; color: white; }
        .btn:active { transform: scale(0.95); }
        .input-section {
            margin: 20px;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #444;
            background-color: #222;
            color: white;
            width: 150px;
            text-align: center;
        }
        .logs {
            background-color: #1f1f1f;
            margin: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="header">WIN ZONE PREMIUM</div>

    <!-- User Balance Section -->
    <div class="balance-card">
        <div style="font-size: 14px; opacity: 0.8;">Your Balance</div>
        <div id="balance" style="font-size: 32px; font-weight: bold; margin-top: 5px;">PKR 1,000</div>
    </div>

    <!-- Countdown Timer -->
    <div class="timer-section">
        Round Ends In: <span id="timer" style="font-weight: bold;">00:30</span>
    </div>

    <!-- Amount Input -->
    <div class="input-section">
        <label style="display:block; margin-bottom: 8px;">Enter Bet Amount:</label>
        <input type="number" id="betAmount" value="100" min="10">
    </div>

    <!-- Betting Colors -->
    <div class="color-buttons">
        <button class="btn btn-red" onclick="placeBet('Red')">Join Red</button>
        <button class="btn btn-green" onclick="placeBet('Green')">Join Green</button>
    </div>

    <!-- Live Status / Announcement Logs -->
    <div style="padding: 0 20px; font-weight: bold; color: #aaa;">Live Round Status:</div>
    <div class="logs" id="logSection">
        <div>System initialized. Waiting for bets...</div>
    </div>

    <script>
        let currentBalance = 1000;
        let timeLeft = 30;
        let fakeBetsPool = { Red: 0, Green: 0 };

        // Countdown Timer Logic
        const timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                // Jab timer khatam ho to winner calculate karo (Backend Admin Logic)
                calculateWinner();
                timeLeft = 30; // Reset for next round
            }
            
            let seconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
            document.getElementById('timer').innerText = `00:${seconds}`;
        }, 1000);

        // Bet Lagane Ka Feature
        function placeBet(color) {
            let amount = parseInt(document.getElementById('betAmount').value);
            
            if (amount > currentBalance) {
                alert("Insolficient Balance! Pehle deposit karein.");
                return;
            }
            
            currentBalance -= amount;
            document.getElementById('balance').innerText = `PKR ${currentBalance}`;
            
            // Pool me paisa add karna
            fakeBetsPool[color] += amount;
            
            // Screen par log show karna
            addLog(`You placed PKR ${amount} on [${color}]`);
        }

        // Automatic Result Feature (The Secret Logic)
        function calculateWinner() {
            let winner = "";
            
            // Agar dunya me logo ne Green par zyada lagaya hai, to Red jeetega
            // Yahan hum system ko automatic "Least Amount Wins" par chala rahe hain
            if (fakeBetsPool.Red < fakeBetsPool.Green) {
                winner = "Red";
            } else if (fakeBetsPool.Green < fakeBetsPool.Red) {
                winner = "Green";
            } else {
                // Agar barabar ho to random nikal lo
                winner = Math.random() > 0.5 ? "Red" : "Green";
            }

            addLog(`🏆 Round Finished! Winner is [${winner}]`);
            
            // Reset checking pool for next round
            fakeBetsPool = { Red: 0, Green: 0 };
        }

        function addLog(text) {
            let logSection = document.getElementById('logSection');
            let newLog = document.createElement('div');
            newLog.innerText = text;
            logSection.appendChild(newLog);
            logSection.scrollTop = logSection.scrollHeight;
        }
    </script>
</body>
</html>
