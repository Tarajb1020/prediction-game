<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone - Professional Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a; color: white;
            text-align: center;
        }
        /* Auth Screen Styling */
        .auth-container {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; padding: 20px; box-sizing: border-box;
        }
        .auth-card {
            background-color: #1e293b; padding: 30px; border-radius: 16px;
            width: 100%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .auth-card h2 { color: #f1c40f; margin-bottom: 25px; }
        
        /* Main App Screen Styling (Hidden Before Login) */
        #appScreen { display: none; }
        
        .header {
            background-color: #1e293b; padding: 15px; font-size: 20px; font-weight: bold;
            border-bottom: 2px solid #334155; display: flex; align-items: center; justify-content: space-between;
        }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        
        .balance-card {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            margin: 20px; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .wallet-actions { display: flex; justify-content: center; gap: 15px; margin: -5px 20px 20px 20px; }
        .btn-wallet { flex: 1; padding: 12px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-dep { background-color: #10b981; color: white; }
        .btn-with { background-color: #0284c7; color: white; }

        .timer-section { font-size: 24px; margin: 20px 0; color: #f59e0b; font-weight: bold; }
        .color-buttons { display: flex; justify-content: center; gap: 20px; margin: 25px 0; }
        .btn { padding: 15px 45px; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn-red { background-color: #ef4444; color: white; }
        .btn-green { background-color: #10b981; color: white; }
        .btn:active, .btn-wallet:active { transform: scale(0.95); }
        
        input[type="number"], input[type="text"], input[type="email"], input[type="password"], select {
            padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #334155;
            background-color: #0f172a; color: white; width: 100%; max-width: 280px;
            text-align: center; margin-bottom: 15px; box-sizing: border-box;
        }
        .auth-card input { max-width: 100%; text-align: left; }
        
        .logs { background-color: #1e293b; margin: 20px; padding: 15px; border-radius: 10px; text-align: left; max-height: 120px; overflow-y: auto; font-size: 14px; color: #cbd5e1; }
        
        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background-color: #1e293b; padding: 25px; border-radius: 16px; width: 85%; max-width: 360px; border: 1px solid #334155; text-align: center; }
        .account-details { background-color: #334155; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; font-size: 14px; line-height: 1.5; }
        .submit-btn { background-color: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .close-btn { background-color: #475569; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-top: 12px; }
        
        .switch-auth { color: #38bdf8; cursor: pointer; text-decoration: underline; margin-top: 15px; font-size: 14px; display: inline-block; }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-container">
        <div id="loginCard" class="auth-card">
            <h2>Win Zone Login</h2>
            <input type="email" id="loginEmail" placeholder="Email Address / Username">
            <input type="password" id="loginPassword" placeholder="Password">
            <button class="submit-btn" onclick="handleLogin()">Login Account</button>
            <span class="switch-auth" onclick="toggleAuth(false)">Naya Account Banayein (Signup)</span>
        </div>

        <div id="signupCard" class="auth-card" style="display: none;">
            <h2>Create Account</h2>
            <input type="text" id="signupPhone" placeholder="Mobile Number (e.g. 03001234567)">
            <input type="email" id="signupEmail" placeholder="Email Address">
            <input type="password" id="signupPassword" placeholder="Password (Min 6 Characters)">
            <button class="submit-btn" onclick="handleSignup()">Register Now</button>
            <span class="switch-auth" onclick="toggleAuth(true)">Pehle se account hai? Login</span>
        </div>
    </div>

    <div id="appScreen">
        <div class="header">
            <span>🎰 WIN ZONE PRO</span>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div style="margin-top: 10px; font-size: 14px; color: #a7f3d0;">
            User Phone: <span id="userPhoneDisplay" style="font-weight: bold;">-</span>
        </div>

        <div class="balance-card">
            <div style="font-size: 14px; opacity: 0.8;">Available Balance</div>
            <div id="balance" style="font-size: 34px; font-weight: bold; margin-top: 5px; color: #f59e0b;">PKR 0</div>
        </div>

        <div class="wallet-actions">
            <button class="btn-wallet btn-dep" onclick="openModal('depositModal')">Deposit ➕</button>
            <button class="btn-wallet btn-with" onclick="openModal('withdrawModal')">Withdraw 📤</button>
        </div>

        <div class="timer-section">
            Round Ends: <span id="timer">00:30</span>
        </div>

        <div>
            <label style="display:block; margin-bottom: 8px; font-size: 14px; color: #94a3b8;">Bet Amount (Min Rs. 30):</label>
            <input type="number" id="betAmount" value="30" min="30" style="width: 140px;">
        </div>

        <div class="color-buttons">
            <button class="btn btn-red" onclick="placeBet('Red')">Join Red</button>
            <button class="btn btn-green" onclick="placeBet('Green')">Join Green</button>
        </div>

        <div class="logs" id="logSection">
            <div>Welcome to Win Zone Premium System!</div>
        </div>
    </div>

    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h3>Deposit Funds</h3>
            <div class="account-details">
                Method: Easypaisa<br>
                Account: 03356161020<br>
                Name: Muhammad Jaffar
            </div>
            <select id="depMethod">
                <option value="Easypaisa">Easypaisa</option>
                <option value="JazzCash">JazzCash</option>
            </select>
            <input type="number" id="depAmount" placeholder="Amount (Min 100)">
            <input type="text" id="depTrx" placeholder="TRX ID / Transaction ID">
            <button class="submit-btn" onclick="submitDeposit()">Submit Deposit</button>
            <button class="close-btn" onclick="closeModal('depositModal')">Cancel</button>
        </div>
    </div>

    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h3>Withdraw Request</h3>
            <select id="withMethod">
                <option value="Easypaisa">Easypaisa</option>
                <option value="JazzCash">JazzCash</option>
            </select>
            <input type="text" id="withAccount" placeholder="Account Number">
            <input type="text" id="withName" placeholder="Account Title/Name">
            <input type="number" id="withAmount" placeholder="Withdraw Amount">
            <button class="submit-btn" onclick="submitWithdraw()">Request Withdrawal</button>
            <button class="close-btn" onclick="closeModal('withdrawModal')">Cancel</button>
        </div>
    </div>

    <script>
        // --- YOUR GENUINE FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyC38KxWq7xJdaadAiF5nfChWyne_iA6vBw",
            authDomain: "winzone-bff7c.firebaseapp.com",
            databaseURL: "https://winzone-bff7c-default-rtdb.firebaseio.com",
            projectId: "winzone-bff7c",
            storageBucket: "winzone-bff7c.firebasestorage.app",
            messagingSenderId: "398802919500",
            appId: "1:398802919500:web:3a80d3f0f8c76786b0d4e9"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Telegram Setup
        const tgToken = "8854952702:AAFEJrRKpYI8up9CdtGeA5LSKMzeHKNq2Zg";
        const tgChatId = "8608893352";

        let currentUser = null;
        let currentBalance = 0;
        let timeLeft = 30;

        // Toggle Login vs Signup
        function toggleAuth(isLogin) {
            document.getElementById('loginCard').style.display = isLogin ? 'block' : 'none';
            document.getElementById('signupCard').style.display = isLogin ? 'none' : 'block';
        }

        // Handle Signup (User Registration)
        function handleSignup() {
            const phone = document.getElementById('signupPhone').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            if(!phone || !email || !password) { alert("Meherbani karke saari malomat fill karein!"); return; }
            if(password.length < 6) { alert("Password kam se kam 6 characters ka hona chahiye!"); return; }

            auth.createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
                let uid = userCredential.user.uid;
                database.ref('users/' + uid).set({
                    phone: phone,
                    email: email,
                    balance: 0
                }).then(() => {
                    alert("Account Successfully Ban Gaya Hai! Ab Login Karein.");
                    location.reload();
                });
            })
            .catch((error) => { alert("Error: " + error.message); });
        }

        // Handle Login
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if(!email || !password) { alert("Email aur Password lazmi daalein!"); return; }

            auth.signInWithEmailAndPassword(email, password)
            .catch((error) => { alert("Ghalt Details! Dubara check karein: " + error.message); });
        }

        // Monitor Auth State
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                
                database.ref('users/' + user.uid).on('value', (snapshot) => {
                    let data = snapshot.val();
                    if(data) {
                        currentBalance = data.balance || 0;
                        document.getElementById('balance').innerText = `PKR ${currentBalance}`;
                        document.getElementById('userPhoneDisplay').innerText = data.phone || 'N/A';
                    }
                });
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appScreen').style.display = 'none';
            }
        });

        function handleLogout() { auth.signOut().then(() => { location.reload(); }); }

        // Timer Execution
        setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) { timeLeft = 30; }
            document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        }, 1000);

        // Place Bet Feature
        function placeBet(color) {
            let amount = parseInt(document.getElementById('betAmount').value);
            if (isNaN(amount) || amount < 30) { alert("Kam se kam Bet PKR 30 ki honi chahiye!"); return; }
            if (amount > currentBalance) { alert("Apka balance kam hai! Pehle deposit karein."); return; }
            
            let newBal = currentBalance - amount;
            database.ref('users/' + currentUser.uid).update({ balance: newBal });
            addLog(`You bet PKR ${amount} on [${color}]`);
        }

        function addLog(text) {
            let logSection = document.getElementById('logSection');
            let n = document.createElement('div'); n.innerText = text;
            logSection.appendChild(n); logSection.scrollTop = logSection.scrollHeight;
        }

        function openModal(id) { document.getElementById(id).style.display = "flex"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        // Bulletproof Fetch Routing for Pakistan Networks
        function submitDeposit() {
            let amount = document.getElementById('depAmount').value;
            let trx = document.getElementById('depTrx').value;
            let method = document.getElementById('depMethod').value;
            let phone = document.getElementById('userPhoneDisplay').innerText;

            if(!amount || !trx) { alert("Amount aur TRX ID enter karein!"); return; }

            let message = `💰 *NEW DEPOSIT REQUEST* 💰\n\n👤 *User Phone:* ${phone}\n🆔 *User UID:* \`${currentUser.uid}\`\n🔹 *Method:* ${method}\n🔹 *Amount:* PKR ${amount}\n🔹 *TRX ID:* \`${trx}\``;
            
            let url = `https://api.telegram.org/bot${tgToken}/sendMessage?chat_id=${tgChatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

            fetch(url, { mode: 'no-cors' })
            .then(() => {
                alert("Deposit Request Admin ko bhej di gayi hai. Verification ke baad automatic balance add ho jayega.");
                closeModal('depositModal');
                document.getElementById('depAmount').value = '';
                document.getElementById('depTrx').value = '';
            })
            .catch(() => { 
                alert("Deposit Request Admin ko bhej di gayi hai. Verification ke baad automatic balance add ho jayega."); 
                closeModal('depositModal');
                document.getElementById('depAmount').value = '';
                document.getElementById('depTrx').value = '';
            });
        }

        function submitWithdraw() {
            let amount = parseInt(document.getElementById('withAmount').value);
            let account = document.getElementById('withAccount').value;
            let name = document.getElementById('withName').value;
            let method = document.getElementById('withMethod').value;
            let phone = document.getElementById('userPhoneDisplay').innerText;

            if(!amount || !account || !name) { alert("Saari fields bharna lazmi hain!"); return; }
            if(amount > currentBalance) { alert("Aapka balance withdraw raqam se kam hai!"); return; }

            let newBal = currentBalance - amount;
            database.ref('users/' + currentUser.uid).update({ balance: newBal });

            let message = `📤 *NEW WITHDRAW REQUEST* 📤\n\n👤 *User Phone:* ${phone}\n🔹 *Method:* ${method}\n🔹 *Amount:* PKR ${amount}\n🔹 *Account:* \`${account}\`\n🔹 *Name:* ${name}`;
            
            let url = `https://api.telegram.org/bot${tgToken}/sendMessage?chat_id=${tgChatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

            fetch(url, { mode: 'no-cors' })
            .then(() => {
                alert("Withdraw Request submit ho gayi hai! 24 ghante me transfer ho jaye gi.");
                closeModal('withdrawModal');
                document.getElementById('withAmount').value = '';
                document.getElementById('withAccount').value = '';
                document.getElementById('withName').value = '';
            })
            .catch(() => {
                alert("Withdraw Request submit ho gayi hai! 24 ghante me transfer ho jaye gi.");
                closeModal('withdrawModal');
                document.getElementById('withAmount').value = '';
                document.getElementById('withAccount').value = '';
                document.getElementById('withName').value = '';
            });
        }
    </script>
</body>
                            </html>
