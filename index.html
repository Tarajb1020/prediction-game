<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Zone Pro - Elite Trading v4.0</title>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --primary-gold: #b08d57;
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.9);
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-green: #27ae60;
            --accent-red: #e74c3c;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            text-align: center;
        }

        /* --- AUTH SCREEN --- */
        .auth-container { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; padding: 20px; 
            background: linear-gradient(135deg, #ffffff 0%, #d7e1ec 100%); 
        }
        .auth-card { 
            background: var(--white); padding: 40px 25px; border-radius: 30px; 
            width: 100%; max-width: 380px; box-shadow: var(--shadow); 
            border: 1px solid rgba(255,255,255,0.7);
        }
        .auth-card h2 { color: var(--primary-gold); font-size: 28px; margin-bottom: 30px; font-weight: 900; }

        /* --- HEADER --- */
        .header { 
            background: var(--white); padding: 15px 20px; 
            display: flex; align-items: center; justify-content: space-between; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.04); position: sticky; top: 0; z-index: 100;
        }
        .header span { color: var(--primary-gold); font-weight: 800; font-size: 16px; letter-spacing: 1px; }
        .logout-btn { background: #fdf2f2; color: var(--accent-red); border: none; padding: 8px 15px; border-radius: 12px; cursor: pointer; font-size: 11px; font-weight: 700; }

        /* --- BALANCE CARD --- */
        .balance-card { 
            background: var(--white); margin: 15px; padding: 25px; 
            border-radius: 24px; box-shadow: var(--shadow);
            display: flex; justify-content: space-between; align-items: center;
            background-image: linear-gradient(to right, #ffffff, #faf9f6);
        }
        #balance { font-size: 30px; font-weight: 900; color: var(--text-dark); letter-spacing: -1px; }

        /* --- TABS --- */
        .game-tabs { display: flex; background: #e9ecef; margin: 10px 15px; padding: 5px; border-radius: 15px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px 5px; font-size: 13px; font-weight: 700; border: none; border-radius: 12px; background: transparent; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--white); color: var(--primary-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* --- TIMER SECTION (WITH 5s ALERT) --- */
        .timer-section { background: var(--white); margin: 15px; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); border: 1px solid #f1f1f1; }
        #timer { font-size: 26px; font-weight: 900; background: #f8f9fa; padding: 5px 20px; border-radius: 15px; color: var(--text-dark); transition: all 0.3s; }
        #timer.critical { color: var(--accent-red); animation: pulseAlert 0.8s infinite; transform: scale(1.1); }
        @keyframes pulseAlert { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- GRID & BUTTONS --- */
        .control-panel { background: white; margin: 15px; border-radius: 24px; padding: 20px; box-shadow: var(--shadow); }
        .btn-big { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; flex: 1; padding: 18px; border-radius: 18px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3); }
        .btn-small { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; flex: 1; padding: 18px; border-radius: 18px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3); }

        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .num-btn { padding: 15px 0; border: none; border-radius: 15px; color: white; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 3px 8px rgba(0,0,0,0.05); }

        /* --- TRENDS & HISTORY --- */
        .history-box { background: var(--white); margin: 15px; padding: 15px; border-radius: 20px; box-shadow: var(--shadow); text-align: left; }
        .trends-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .trend-dot { min-width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; color: white; flex-shrink: 0; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

        .history-table-container { background: white; margin: 15px; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); }
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th { background: #fbfbfb; padding: 15px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .history-table td { padding: 18px 10px; border-bottom: 1px solid #f8f9fa; font-size: 14px; font-weight: 700; }

        input { border: 2px solid #edf2f7; border-radius: 15px; padding: 15px; background: #fdfdfd; width: 100%; box-sizing: border-box; text-align: center; font-weight: 800; color: var(--text-dark); font-size: 18px; outline: none; }
        .submit-btn { background: var(--primary-gold); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: 800; width: 100%; cursor: pointer; box-shadow: 0 5px 20px rgba(176, 141, 87, 0.4); }

        #appScreen { display: none; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="auth-container">
        <div id="loginCard" class="auth-card">
            <h2>WIN ZONE ELITE</h2>
            <input type="email" id="loginEmail" placeholder="Email Address">
            <input type="password" id="loginPassword" placeholder="Password" style="margin-top:12px;">
            <button class="submit-btn" style="margin-top:25px;" onclick="handleLogin()">SECURE LOGIN</button>
            <p style="color:var(--primary-gold); margin-top:20px; font-size:13px; font-weight:700; cursor:pointer;" onclick="toggleAuth(false)">Create Professional Account</p>
        </div>
        <div id="signupCard" class="auth-card" style="display:none;">
            <h2>REGISTER</h2>
            <input type="text" id="signupPhone" placeholder="Mobile Number">
            <input type="email" id="signupEmail" placeholder="Email Address" style="margin-top:12px;">
            <input type="password" id="signupPassword" placeholder="Password" style="margin-top:12px;">
            <button class="submit-btn" style="margin-top:25px;" onclick="handleSignup()">JOIN NOW</button>
            <p style="color:var(--primary-gold); margin-top:20px; font-size:13px; font-weight:700; cursor:pointer;" onclick="toggleAuth(true)">Back to Login</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="appScreen">
        <div class="header">
            <span>WIN ZONE PRO v4.0</span>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="balance-card">
            <div style="text-align: left;">
                <div style="font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Assets Liquidity</div>
                <div id="balance">PKR 0</div>
            </div>
            <div style="text-align: right;">
                <div id="userPhoneDisplay" style="font-weight: 800; color: var(--text-muted);">-</div>
                <button class="submit-btn" style="padding: 6px 15px; font-size: 11px; margin-top:8px;" onclick="window.location.reload()">Refresh</button>
            </div>
        </div>

        <div class="game-tabs">
            <button class="tab-btn active" id="navHome" onclick="navigateToSection('home')">Predict</button>
            <button class="tab-btn" id="navWithdraw" onclick="navigateToSection('withdraw')">Withdraw</button>
            <button class="tab-btn" onclick="alert('Contact Admin for Deposit')">Deposit</button>
        </div>

        <!-- HOME GAME -->
        <div id="sectionHome" style="display:block;">
            <div class="timer-section">
                <div style="text-align:left;">
                    <div style="color:var(--accent-green); font-size:10px; font-weight:900;">• MARKET OPEN</div>
                    <div style="font-size:12px; color:var(--text-muted);">Trade Closing In:</div>
                </div>
                <div id="timer">00:30</div>
            </div>

            <div class="control-panel">
                <label style="display:block; text-align:left; font-size:12px; font-weight:800; color:var(--text-muted); margin-bottom:12px;">STAKE AMOUNT</label>
                <input type="number" id="betAmount" value="500" min="150">
                
                <div style="display:flex; gap:15px; margin-top:20px;">
                    <button class="btn-big" onclick="placeBet('size', 'Big')">BIG</button>
                    <button class="btn-small" onclick="placeBet('size', 'Small')">SMALL</button>
                </div>

                <div class="number-grid">
                    <button class="num-btn" style="background:#8e44ad;" onclick="placeBet('number', 0)">0</button>
                    <button class="num-btn" style="background:#27ae60;" onclick="placeBet('number', 1)">1</button>
                    <button class="num-btn" style="background:#27ae60;" onclick="placeBet('number', 2)">2</button>
                    <button class="num-btn" style="background:#27ae60;" onclick="placeBet('number', 3)">3</button>
                    <button class="num-btn" style="background:#27ae60;" onclick="placeBet('number', 4)">4</button>
                    <button class="num-btn" style="background:#8e44ad;" onclick="placeBet('number', 5)">5</button>
                    <button class="num-btn" style="background:#e74c3c;" onclick="placeBet('number', 6)">6</button>
                    <button class="num-btn" style="background:#e74c3c;" onclick="placeBet('number', 7)">7</button>
                    <button class="num-btn" style="background:#e74c3c;" onclick="placeBet('number', 8)">8</button>
                    <button class="num-btn" style="background:#e74c3c;" onclick="placeBet('number', 9)">9</button>
                </div>
            </div>

            <div class="game-section-label" style="text-align:left; margin-left:20px; font-weight:800; color:var(--text-muted); font-size:12px;">MARKET TRENDS</div>
            <div class="history-box">
                <div class="trends-list" id="trendsHistory"></div>
            </div>

            <div class="history-table-container">
                <table class="history-table">
                    <thead><tr><th>Category</th><th>Stake</th><th>Result</th><th>Payout</th></tr></thead>
                    <tbody id="userBetHistoryBody"></tbody>
                </table>
            </div>
        </div>

        <!-- WITHDRAW -->
        <div id="sectionWithdraw" style="display:none; padding:20px;">
            <div class="auth-card" style="max-width:100%; box-shadow:none; border:none;">
                <h3 style="color:var(--accent-red)">Withdrawal Gate</h3>
                <input type="text" id="withAccount" placeholder="JazzCash/EasyPaisa Number">
                <input type="text" id="withTitle" placeholder="Account Holder Name" style="margin-top:10px;">
                <input type="number" id="withAmount" placeholder="Min 1000 PKR" style="margin-top:10px;">
                <button class="submit-btn" style="background:var(--accent-red); margin-top:20px;" onclick="processWithdrawal()">REQUEST CASHOUT</button>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG (INTEGRATED) ---
        const firebaseConfig = {
            apiKey: "AIzaSyC38KxWq7xJdaadAiF5nfChWyne_iA6vBw",
            authDomain: "winzone-bff7c.firebaseapp.com",
            databaseURL: "https://winzone-bff7c-default-rtdb.firebaseio.com",
            projectId: "winzone-bff7c",
            storageBucket: "winzone-bff7c.firebasestorage.app",
            messagingSenderId: "398802919500",
            appId: "1:398802919500:web:3a80d3f0f8c76786b0d4e9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentBalance = 0;
        let currentUser = null;

        // Auth Listener
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                loadUserData(user.uid);
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appScreen').style.display = 'none';
            }
        });

        function loadUserData(uid) {
            database.ref('users/' + uid).on('value', snap => {
                const data = snap.val();
                if(data) {
                    currentBalance = data.balance || 0;
                    document.getElementById('balance').innerText = "PKR " + currentBalance;
                    document.getElementById('userPhoneDisplay').innerText = data.phone || data.email;
                }
            });
        }

        // Professional Timer with Last 5 Sec Blink
        setInterval(() => {
            let now = new Date();
            let seconds = 60 - now.getSeconds();
            let timerEl = document.getElementById('timer');
            timerEl.innerText = "00:" + (seconds < 10 ? '0' + seconds : seconds);

            if(seconds <= 5) {
                timerEl.classList.add('critical');
            } else {
                timerEl.classList.remove('critical');
            }
        }, 1000);

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }

        function handleSignup() {
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPassword').value;
            const phone = document.getElementById('signupPhone').value;
            auth.createUserWithEmailAndPassword(email, pass).then(res => {
                database.ref('users/' + res.user.uid).set({ email, phone, balance: 0 });
            }).catch(e => alert(e.message));
        }

        function placeBet(type, value) {
            const amount = parseInt(document.getElementById('betAmount').value);
            if(amount > currentBalance) return alert("Insufficient Balance");
            if(amount < 150) return alert("Min bet is 150 PKR");

            database.ref('users/' + currentUser.uid).update({ balance: currentBalance - amount });
            alert("Success! Prediction '" + value + "' placed for " + amount + " PKR.");
        }

        function navigateToSection(sec) {
            document.getElementById('sectionHome').style.display = sec === 'home' ? 'block' : 'none';
            document.getElementById('sectionWithdraw').style.display = sec === 'withdraw' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sec === 'home' ? 'navHome' : 'navWithdraw').classList.add('active');
        }

        function handleLogout() { auth.signOut(); }
        function toggleAuth(login) {
            document.getElementById('loginCard').style.display = login ? 'block' : 'none';
            document.getElementById('signupCard').style.display = login ? 'none' : 'block';
        }
    </script>
</body>
</html>
